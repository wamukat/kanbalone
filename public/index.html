<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1f6f5f" />
    <title>SoloBoard</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <div id="board-list" class="board-list"></div>
        <button id="new-board-button" type="button" class="board-add-button icon-button" title="New board" aria-label="New board">
          <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#plus"></use></svg>
        </button>

        <section id="sidebar-view-section" class="sidebar-section">
          <div class="sidebar-section-head">
            <h3>View</h3>
          </div>
          <div id="view-mode-toggle" class="filter-toggle sidebar-toggle" role="group" aria-label="View mode">
            <button type="button" data-view-mode="kanban" class="active">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#columns-3"></use></svg>
              <span>Kanban</span>
            </button>
            <button type="button" data-view-mode="list">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#list"></use></svg>
              <span>List</span>
            </button>
          </div>
        </section>

        <section id="sidebar-tag-section" class="sidebar-section" hidden>
          <div class="sidebar-section-head">
            <h3>Tags</h3>
            <button id="new-sidebar-tag-button" type="button" class="icon-button" title="New tag" aria-label="New tag">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#plus"></use></svg>
            </button>
          </div>
          <div id="sidebar-tag-list" class="sidebar-tag-list"></div>
        </section>

        <section id="sidebar-board-section" class="sidebar-section" hidden>
          <div class="sidebar-section-head sidebar-board-control">
            <button id="board-settings-toggle-button" type="button" class="icon-button sidebar-board-settings-toggle" title="Board settings" aria-label="Board settings" aria-expanded="false" aria-controls="sidebar-board-actions-panel">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#settings"></use></svg>
            </button>
          </div>
          <div id="sidebar-board-actions-panel" class="sidebar-board-actions-panel">
            <h3 class="sidebar-board-panel-title">Board</h3>
            <div class="sidebar-board-actions">
              <div class="sidebar-board-transfer">
                <button id="export-board-button" type="button" class="action-with-icon">
                  <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#download"></use></svg>
                  <span>Export</span>
                </button>
                <label class="import-button action-with-icon" title="Import board">
                  <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#upload"></use></svg>
                  <span>Import</span>
                  <input id="import-board-input" type="file" accept="application/json" hidden />
                </label>
              </div>
              <button id="rename-board-button" type="button" class="action-with-icon">
                <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#pencil"></use></svg>
                <span>Rename</span>
              </button>
              <button id="delete-board-button" type="button" class="danger action-with-icon">
                <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#trash-2"></use></svg>
                <span>Delete</span>
              </button>
            </div>
          </div>
        </section>
      </aside>
      <button id="sidebar-toggle-button" type="button" class="sidebar-edge-toggle icon-button ghost" title="Toggle sidebar" aria-label="Toggle sidebar">
        <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#chevron-left"></use></svg>
      </button>

      <main class="main">
        <header class="toolbar">
          <div class="board-title-row">
            <button id="sidebar-reopen-button" type="button" class="icon-button ghost" title="Open sidebar" aria-label="Open sidebar" hidden>
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#menu"></use></svg>
            </button>
            <h2 id="board-title" class="collapsed-board-title">No board selected</h2>
          </div>
          <div class="toolbar-actions">
            <label class="toolbar-search" for="search-input">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#search"></use></svg>
              <input id="search-input" type="search" placeholder="Search tickets" />
            </label>
            <div class="toolbar-filters">
              <select id="lane-filter" hidden>
                <option value="">All lanes</option>
              </select>
              <div id="completed-filter" class="filter-toggle" role="group" aria-label="Completion filter">
                <button type="button" data-value="">All</button>
                <button type="button" data-value="false" class="active">Open</button>
                <button type="button" data-value="true">Done</button>
              </div>
              <select id="tag-filter">
                <option value="">All tags</option>
              </select>
              <button id="archived-filter-button" type="button" class="ghost toolbar-utility-button">
                <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#archive"></use></svg>
                <span>Archived</span>
              </button>
            </div>
          </div>
        </header>

        <section id="lane-board" class="lane-board empty">
          <div class="empty-state">
            <p>Create a board to start tracking tasks.</p>
          </div>
        </section>
        <section id="list-board" class="list-board" hidden></section>
        <footer class="main-footer">
          <a href="https://github.com/wamukat/SoloBoard" target="_blank" rel="noreferrer">GitHub</a>
        </footer>
      </main>
    </div>

    <dialog id="editor-dialog" class="editor-dialog">
      <div class="editor-form">
        <div class="editor-header">
          <div class="editor-dialog-heading">
            <div class="editor-dialog-heading-top">
              <span id="editor-header-state" class="ticket-state-pill ticket-state-pill-open" hidden>Open</span>
              <span id="editor-header-id" class="muted"></span>
            </div>
            <h2 id="editor-header-title" class="editor-header-title" hidden></h2>
            <div id="editor-save-state" class="editor-save-state" hidden>Saved</div>
          </div>
          <div class="editor-header-actions">
            <button id="header-edit-button" type="button" class="ghost icon-button dialog-close-button" aria-label="Edit ticket" title="Edit" hidden>
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#pencil"></use></svg>
            </button>
          </div>
        </div>

        <section id="ticket-view" class="ticket-view" hidden>
          <div id="ticket-view-meta" class="ticket-view-meta"></div>
          <div id="ticket-view-body" class="markdown ticket-view-body"></div>
          <div id="ticket-relations" class="ticket-relations"></div>

          <div id="ticket-view-tabs" class="detail-tabs" role="tablist" aria-label="Ticket details">
            <button type="button" id="comments-tab-button" class="detail-tab active" role="tab" aria-selected="true">Comments</button>
            <button type="button" id="activity-tab-button" class="detail-tab" role="tab" aria-selected="false">Activity</button>
          </div>

          <section id="activity-section" class="activity-section" hidden>
            <div id="ticket-activity" class="activity-list"></div>
          </section>

          <section id="comments-section" class="comments-section">
            <form id="comment-form" class="comment-form">
              <label>
                Add Comment
                <textarea id="comment-body" rows="5"></textarea>
              </label>
              <div class="editor-actions">
                <div class="editor-actions-right">
                  <button id="save-comment-button" type="button" class="primary-action">Add Comment</button>
                </div>
              </div>
            </form>
            <div id="ticket-comments" class="comments-list"></div>
          </section>
        </section>

        <form id="editor-form" method="dialog" class="editor-mode" hidden>
          <div class="editor-title-field">
            <input id="ticket-title" name="title" required placeholder="Title" />
          </div>

          <textarea id="ticket-body" name="bodyMarkdown" rows="10" aria-label="Ticket body" placeholder="Write details in Markdown"></textarea>

          <div class="editor-inline-row">
             <label class="editor-compact-label">
              <span>Lane</span>
              <select id="ticket-lane" name="laneId"></select>
            </label>

             <label class="editor-compact-label">
              <span>Priority</span>
              <input id="ticket-priority" name="priority" type="number" step="1" value="0" />
            </label>

             <label id="ticket-completed-row" class="editor-compact-label completion-toggle">
              <span class="completion-toggle-label">Done</span>
              <input id="ticket-completed" class="toggle-switch-input" name="isCompleted" type="checkbox" />
              <span class="completion-toggle-control toggle-switch-control">
                <span class="completion-switch toggle-switch-knob" aria-hidden="true"></span>
              </span>
            </label>

          </div>

          <div class="editor-field">
            <div class="editor-field-label">Tags</div>
            <div class="ticket-tag-field">
              <div id="ticket-tag-toggle" class="ticket-tag-input" aria-expanded="false" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                <div id="ticket-tag-summary" class="ticket-tag-summary"></div>
                <input id="ticket-tag-search" type="text" class="ticket-tag-search" placeholder="Add tags" autocomplete="off" />
                <button id="ticket-new-tag-button" type="button" class="icon-button ghost" title="New tag" aria-label="New tag">
                  <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#plus"></use></svg>
                </button>
              </div>
              <div id="ticket-tag-options" class="ticket-tag-options" hidden></div>
            </div>
          </div>

          <div class="editor-field-label editor-section-label">Relations</div>

          <div class="editor-relations-content">
            <div class="ticket-tag-field">
              <div id="ticket-blocker-toggle" class="ticket-tag-input" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                <div id="ticket-blocker-summary" class="ticket-tag-summary"></div>
                <input id="ticket-blocker-search" type="text" class="ticket-tag-search" placeholder="Add blockers by ID or title" autocomplete="off" />
              </div>
              <div id="ticket-blocker-options" class="ticket-tag-options" hidden></div>
            </div>

            <div class="ticket-tag-field">
              <div id="ticket-parent-toggle" class="ticket-tag-input" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                <div id="ticket-parent-summary" class="ticket-tag-summary"></div>
                <input id="ticket-parent-search" type="text" class="ticket-tag-search" placeholder="Set parent by ID or title" autocomplete="off" />
              </div>
              <div id="ticket-parent-options" class="ticket-tag-options" hidden></div>
              <input id="ticket-parent" name="parentTicketId" type="hidden" value="" />
            </div>

            <div id="ticket-children-row" class="ticket-tag-field">
              <div id="ticket-child-toggle" class="ticket-tag-input" role="combobox" aria-haspopup="listbox" aria-expanded="false">
                <div id="ticket-child-summary" class="ticket-tag-summary"></div>
                <input id="ticket-child-search" type="text" class="ticket-tag-search" placeholder="Add children by ID or title" autocomplete="off" />
              </div>
              <div id="ticket-child-options" class="ticket-tag-options" hidden></div>
            </div>
          </div>

          <div class="editor-actions">
            <button id="delete-ticket-button" type="button" class="danger action-with-icon">
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#trash-2"></use></svg>
              <span>Delete</span>
            </button>
            <button id="archive-ticket-button" type="button" class="ghost archive-ticket-button action-with-icon" hidden>
              <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#archive"></use></svg>
              <span>Archive</span>
            </button>
            <div class="editor-actions-right">
              <button id="cancel-edit-button" type="button" class="ghost">Cancel</button>
              <button id="save-ticket-button" type="submit" class="primary-action">Save</button>
            </div>
          </div>
        </form>
      </div>
    </dialog>

    

    <dialog id="ux-dialog" class="ux-dialog">
      <form id="ux-form" class="ux-form" method="dialog">
        <div class="editor-header">
          <h3 id="ux-title">Action</h3>
          <button id="ux-cancel-button" type="button" class="ghost icon-button dialog-close-button" aria-label="Close dialog" title="Close">
            <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#x"></use></svg>
          </button>
        </div>
        <p id="ux-message" class="muted" hidden></p>
        <div id="ux-fields" class="ux-fields"></div>
        <div id="ux-error" class="danger" hidden></div>
        <div class="editor-actions">
          <button id="ux-danger-button" type="button" class="danger action-with-icon" hidden>
            <svg class="icon" aria-hidden="true" focusable="false"><use href="/icons.svg#trash-2"></use></svg>
            <span>Delete</span>
          </button>
          <div class="editor-actions-right">
            <button id="ux-dismiss-button" type="button" class="ghost">Cancel</button>
            <button id="ux-submit-button" type="submit" class="primary-action">Save</button>
          </div>
        </div>
      </form>
    </dialog>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
