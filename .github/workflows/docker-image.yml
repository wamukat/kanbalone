name: Docker Image

on:
  pull_request:
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "public/**"
      - "src/**"
      - "tsconfig.json"
      - ".github/workflows/docker-image.yml"
  push:
    branches:
      - main
    paths:
      - ".dockerignore"
      - "Dockerfile"
      - "docker-compose.yml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "public/**"
      - "src/**"
      - "tsconfig.json"
      - ".github/workflows/docker-image.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: soloboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
