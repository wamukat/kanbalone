name: kanbalone

services:
  kanbalone:
    image: ghcr.io/wamukat/kanbalone:v0.9.26
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      KANBALONE_DB_FILE: /app/data/kanbalone.sqlite
    ports:
      - "${KANBAN_PORT:-3000}:3000"
    volumes:
      - kanbalone-data:/app/data
    restart: unless-stopped

volumes:
  kanbalone-data:
