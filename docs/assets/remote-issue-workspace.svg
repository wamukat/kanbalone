<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Remote issue execution workspace concept</title>
  <desc id="desc">A diagram showing a remote issue tracker on the left, Kanbalone as a local execution workspace in the center, and developer plus AI on the right. The remote issue is imported into Kanbalone, local body and comments are used for implementation, and selected comments are pushed back upstream.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f1e8" />
      <stop offset="100%" stop-color="#efe7db" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdf8" />
      <stop offset="100%" stop-color="#f7f2e8" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#8d7a5a" flood-opacity="0.14" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M1 1 L11 7 L1 13" fill="none" stroke="#7d5f34" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)" />
  <circle cx="140" cy="112" r="120" fill="#ffffff" opacity="0.26" />
  <circle cx="1104" cy="592" r="168" fill="#ffffff" opacity="0.18" />

  <text x="640" y="84" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="40" font-weight="700" fill="#382918">
    Remote Issues, Local Execution
  </text>
  <text x="640" y="122" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#5c4630">
    Keep requirements upstream. Build implementation context locally.
  </text>

  <g filter="url(#softShadow)">
    <rect x="80" y="190" width="280" height="318" rx="28" fill="url(#card)" stroke="#d8c6a9" stroke-width="2" />
    <rect x="500" y="154" width="280" height="392" rx="30" fill="#fdf9f0" stroke="#b48a4c" stroke-width="3" />
    <rect x="920" y="190" width="280" height="318" rx="28" fill="url(#card)" stroke="#d8c6a9" stroke-width="2" />
  </g>

  <text x="220" y="236" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#382918">
    Remote Tracker
  </text>
  <text x="220" y="268" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6a5237">
    GitHub / GitLab / Redmine
  </text>
  <rect x="124" y="300" width="192" height="152" rx="20" fill="#fff" stroke="#dac8ac" stroke-width="2" />
  <text x="150" y="336" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#44311d">
    Issue #123
  </text>
  <rect x="150" y="356" width="136" height="12" rx="6" fill="#dbc9aa" />
  <rect x="150" y="378" width="120" height="12" rx="6" fill="#e8dcc6" />
  <rect x="150" y="410" width="140" height="28" rx="14" fill="#ede3d1" />
  <text x="220" y="428" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#6a5237">
    title / body / state
  </text>

  <text x="640" y="208" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#382918">
    Kanbalone
  </text>
  <text x="640" y="238" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#7d5f34">
    Local execution workspace
  </text>
  <rect x="548" y="274" width="184" height="64" rx="18" fill="#fff" stroke="#d8c6a9" stroke-width="2" />
  <text x="640" y="314" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#44311d">
    Remote Snapshot
  </text>
  <rect x="548" y="356" width="184" height="64" rx="18" fill="#fff" stroke="#d8c6a9" stroke-width="2" />
  <text x="640" y="396" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#44311d">
    Local Body
  </text>
  <rect x="548" y="438" width="184" height="64" rx="18" fill="#fff" stroke="#d8c6a9" stroke-width="2" />
  <text x="640" y="478" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#44311d">
    Work Comments
  </text>

  <text x="1060" y="236" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#382918">
    You + AI
  </text>
  <text x="1060" y="268" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#6a5237">
    implement from local context
  </text>
  <circle cx="1006" cy="356" r="38" fill="#e9dcc5" />
  <circle cx="1114" cy="356" r="38" fill="#f1e7d7" />
  <path d="M975 436 C990 405 1020 400 1040 436" fill="#d7b98a" />
  <rect x="1068" y="408" width="94" height="54" rx="12" fill="#d7b98a" />
  <circle cx="1096" cy="351" r="14" fill="#9a6d2f" />
  <circle cx="1132" cy="351" r="14" fill="#9a6d2f" />
  <rect x="965" y="470" width="190" height="16" rx="8" fill="#e1d2b8" />
  <rect x="965" y="498" width="168" height="16" rx="8" fill="#eadfcd" />

  <path d="M360 350 C430 350 448 326 500 326" fill="none" stroke="#7d5f34" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="432" y="306" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#6a5237">
    Import issue
  </text>

  <path d="M780 388 C860 388 872 362 920 362" fill="none" stroke="#7d5f34" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="852" y="340" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#6a5237">
    Work locally
  </text>

  <path d="M920 446 C860 446 844 480 780 480" fill="none" stroke="#7d5f34" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="848" y="520" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#6a5237">
    Notes and progress
  </text>

  <path d="M548 470 C450 470 436 536 350 536" fill="none" stroke="#7d5f34" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)" />
  <text x="434" y="580" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700" fill="#6a5237">
    Push selected comments
  </text>

  <text x="640" y="652" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#5c4630">
    Remote stays canonical. Kanbalone stays fast, local, and implementation-focused.
  </text>
</svg>
